[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"
  included_files = ["src/**", "flows/**", "public/**"]

[functions.server]
  timeout = 26

[functions."send-reminders"]
  schedule = "*/15 * * * *"
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
