# Bygate on Netlify — Next.js site (web/) + WhatsApp bot (Express function)

[build]
  command = "npm install && cd web && npm install && npm run build"
  publish = "web/.next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Public site URL for the marketing/dashboard app
  NEXT_PUBLIC_SITE_URL = "https://mysogibot.netlify.app"

# OpenNext adapter — runs the animated Next.js app (landing, dashboard, admin)
[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  included_files = ["src/**", "flows/**"]

[functions.server]
  timeout = 26

[functions."send-reminders"]
  schedule = "*/15 * * * *"
  timeout = 26

# ── WhatsApp bot / payments (Express) — force so Next does not take these paths ──
[[redirects]]
  from = "/webhook"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/webhook/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/pin/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
